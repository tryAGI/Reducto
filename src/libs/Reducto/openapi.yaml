  "components": {
    "schemas": {
      "AdvancedCitationsConfig": {
        "properties": {
          "numerical_confidence": {
            "type": "boolean",
            "title": "Numerical Confidence",
            "description": "If True, enable numeric citation confidence scores. Defaults to False.",
            "default": false
          }
        },
        "type": "object",
        "title": "AdvancedCitationsConfig"
      },
      "AdvancedProcessingOptions": {
        "properties": {
          "ocr_system": {
            "type": "string",
            "enum": ["highres", "multilingual", "combined", "reducto", "legacy", "reducto-v2"],
            "title": "Ocr System",
            "description": "The OCR system to use. Highres is recommended for documents with English characters. Legacy uses an alternative OCR backend.",
            "default": "highres"
          },
          "table_output_format": {
            "type": "string",
            "enum": ["html", "json", "md", "jsonbbox", "dynamic", "ai_json", "csv"],
            "title": "Table Output Format",
            "description": "The mode to use for table output. Dynamic returns md for simpler tables and html for more complex tables.",
            "default": "html"
          },
          "merge_tables": {
            "type": "boolean",
            "title": "Merge Tables",
            "description": "A flag to indicate if consecutive tables with the same number of columns should be merged across breaks and spaces.",
            "default": false
          },
          "include_formula_information": {
            "type": "boolean",
            "title": "Include Formula Information",
            "description": "If True, preserve formula information in spreadsheet cells by wrapping text with LaTeX formula commands during parsing.",
            "default": false
          },
          "include_color_information": {
            "type": "boolean",
            "title": "Include Color Information",
            "description": "If True, preserve Excel cell colours in the extracted spreadsheet text using LaTeX colour commands.",
            "default": false
          },
          "include_dropdown_information": {
            "type": "boolean",
            "title": "Include Dropdown Information",
            "description": "If True, include dropdown options and the selected value when rendering spreadsheet cells.",
            "default": false
          },
          "continue_hierarchy": {
            "type": "boolean",
            "title": "Continue Hierarchy",
            "description": "A flag to indicate if the hierarchy of the document should be continued from chunk to chunk.",
            "default": true
          },
          "keep_line_breaks": {
            "type": "boolean",
            "title": "Keep Line Breaks",
            "description": "If line breaks should be preserved in the text.",
            "default": false
          },
          "page_range": {
            "anyOf": [
              { "$ref": "#/components/schemas/PageRange" },
              { "items": { "$ref": "#/components/schemas/PageRange" }, "type": "array" },
              { "items": { "type": "integer" }, "type": "array" },
              { "items": { "type": "string" }, "type": "array" }
            ],
            "title": "Page Range",
            "description": "The page range to process (1-indexed). By default, the entire document is processed. For spreadsheets, you can also provide a list of sheet names.",
            "default": {}
          },
          "force_file_extension": {
            "type": "string",
            "title": "Force File Extension",
            "description": "Force the URL to be downloaded as a specific file extension (e.g. .png)."
          },
          "large_table_chunking": {
            "$ref": "#/components/schemas/LargeTableChunkingConfig",
            "description": "The configuration options for large table chunking (currently only supported on spreadsheet and CSV files).",
            "default": { "enabled": true, "size": 50 }
          },
          "spreadsheet_table_clustering": {
            "type": "string",
            "enum": ["default", "disabled", "intelligent"],
            "title": "Spreadsheet Table Clustering",
            "description": "In a spreadsheet with different tables inside, we enable splitting up the tables by default. Intelligent mode applies more powerful models for superior accuracy, at 5× the default per-cell rate. Disabling will register as one large table.",
            "default": "default"
          },
          "add_page_markers": {
            "type": "boolean",
            "title": "Add Page Markers",
            "description": "If True, add page markers to the output (e.g. [[PAGE 1 BEGINS HERE]] and [[PAGE 1 ENDS HERE]] added as blocks to the content). Defaults to False.",
            "default": false
          },
          "remove_text_formatting": {
            "type": "boolean",
            "title": "Remove Text Formatting",
            "description": "If True, remove text formatting from the output (e.g. hyphens for list items). Defaults to False.",
            "default": false
          },
          "return_ocr_data": {
            "type": "boolean",
            "title": "Return Ocr Data",
            "description": "If True, return OCR data in the result. Defaults to False.",
            "default": false
          },
          "document_password": {
            "type": "string",
            "title": "Document Password",
            "description": "Password to decrypt password-protected documents."
          },
          "filter_line_numbers": {
            "type": "boolean",
            "title": "Filter Line Numbers",
            "description": "If True, filter out line numbers from the output. Defaults to False.",
            "default": false
          },
          "read_comments": {
            "type": "boolean",
            "title": "Read Comments",
            "description": "If True, pull in PDF comments from the document. Defaults to False.",
            "default": false
          },
          "persist_results": {
            "type": "boolean",
            "title": "Persist Results",
            "description": "If True, persist the results indefinitely. Defaults to False.",
            "default": false
          },
          "exclude_hidden_sheets": {
            "type": "boolean",
            "title": "Exclude Hidden Sheets",
            "description": "Skip hidden sheets in Excel files. Defaults to False.",
            "default": false
          },
          "exclude_hidden_rows_cols": {
            "type": "boolean",
            "title": "Exclude Hidden Rows Cols",
            "description": "Skip hidden rows and cols in Excel files. Defaults to False.",
            "default": false
          },
          "enable_change_tracking": {
            "type": "boolean",
            "title": "Enable Change Tracking",
            "description": "Enables model-based detection of underlines and strikethroughs, adding <u>/<s> tags to OCR text. Works with any extraction mode. Defaults to False.",
            "default": false
          },
          "enable_highlight_detection": {
            "type": "boolean",
            "title": "Enable Highlight Detection",
            "description": "If True, enable highlight detection. Highlighted text will be surrounded by <mark> tags in the output. Defaults to False.",
            "default": false
          },
          "ignore_watermarks": {
            "type": "boolean",
            "title": "Ignore Watermarks",
            "description": "If True, ignore and remove watermarks from OCR output. Defaults to False.",
            "default": false
          }
        },
        "type": "object",
        "title": "AdvancedProcessingOptions"
      },
      "AgentExtractConfig": {
        "properties": {
          "enabled": {
            "type": "boolean",
            "title": "Enabled",
            "description": "If agent extraction should be used for extraction.",
            "default": false
          }
        },
        "type": "object",
        "title": "AgentExtractConfig"
      },
      "AgentInTheLoop": {
        "properties": {
          "enabled": {
            "type": "boolean",
            "title": "Enabled",
            "description": "If True, include the agent in the loop for the extraction.",
            "default": false
          },
          "fields_to_verify": {
            "items": { "type": "string" },
            "type": "array",
            "title": "Fields To Verify",
            "description": "The name of the array that the agent will extract. Only one field is currently allowed.",
            "default": []
          }
        },
        "type": "object",
        "title": "AgentInTheLoop"
      },
      "AgenticTablesOverrides": { "properties": {}, "type": "object", "title": "AgenticTablesOverrides" },
      "ArrayExtractConfig": {
        "properties": {
          "enabled": {
            "type": "boolean",
            "title": "Enabled",
            "description": "Array extraction allows you to extract long lists of information from lengthy documents. It makes parallel calls on overlapping sections of the document.",
            "default": false
          },
          "mode": {
            "type": "string",
            "enum": ["auto", "legacy", "streaming", "no_overlap"],
            "title": "Mode",
            "description": "The array extraction version to use.",
            "default": "legacy"
          },
          "pages_per_segment": {
            "type": "integer",
            "title": "Pages Per Segment",
            "description": "Length of each segment, in pages, for parallel calls with array extraction.",
            "default": 10
          },
          "streaming_extract_item_density": {
            "type": "integer",
            "title": "Streaming Extract Item Density",
            "description": "Number of items to extract in each stream call. Lower numbers will increase quality but be much slower. 50 works well for most documents with tables.",
            "default": 50
          }
        },
        "type": "object",
        "title": "ArrayExtractConfig"
      },
      "AsyncEditConfig": {
        "properties": {
          "document_url": {
            "anyOf": [{ "type": "string" }, { "$ref": "#/components/schemas/UploadResponse" }],
            "title": "Document Url",
            "description": "The URL of the document to be processed. You can provide one of the following:\n1. A publicly available URL\n2. A presigned S3 URL\n3. A reducto:// prefixed URL obtained from the /upload endpoint after directly uploading a document\n"
          },
          "edit_instructions": {
            "type": "string",
            "title": "Edit Instructions",
            "description": "The instructions for the edit."
          },
          "edit_options": {
            "$ref": "#/components/schemas/EditOptions",
            "default": { "color": "#FF0000", "enable_overflow_pages": false, "flatten": false }
          },
          "form_schema": {
            "anyOf": [
              { "items": { "$ref": "#/components/schemas/EditWidget" }, "type": "array" },
              { "type": "null" }
            ],
            "title": "Form Schema",
            "description": "Form schema for PDF forms. List of widgets with their types, descriptions, and bounding boxes. Only works for PDFs."
          },
          "priority": {
            "type": "boolean",
            "title": "Priority",
            "description": "If True, attempts to process the job with priority if the user has priority processing budget available; by default, sync jobs are prioritized above async jobs.",
            "default": false
          },
          "webhook": {
            "$ref": "#/components/schemas/WebhookConfigNew",
            "default": { "mode": "disabled", "channels": [] }
          }
        },
